name: Bug report
description: Something broken in the platform or docs
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Cohort platform site
        - Ludwitt/Hult API
        - Admissions take-home
        - Curriculum / docs
        - Other
    validations:
      required: true
