name: Feature request
description: Suggest an improvement to curriculum, platform, or docs
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What should be better or added?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: How would you solve it?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Curriculum
        - Cohort platform site
        - Governance / assessment
        - Templates
        - Other
    validations:
      required: true
