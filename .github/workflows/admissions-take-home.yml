name: CI

on:
  push:
    branches: [main]
    paths:
      - 'execution/admissions-take-home/**'
  pull_request:
    paths:
      - 'execution/admissions-take-home/**'

defaults:
  run:
    working-directory: execution/admissions-take-home

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: execution/admissions-take-home/package-lock.json
      - run: npm ci
      - run: npm run test:ci
