name: CI

on:
  push:
    branches: [main]
    paths:
      - 'execution/marketing/site/**'
  pull_request:
    paths:
      - 'execution/marketing/site/**'

defaults:
  run:
    working-directory: execution/marketing/site

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: execution/marketing/site/package-lock.json
      - run: npm ci
      - run: npm run build
